                                    }`}
                                  >
                                    <span>{opt}</span>
                                  </button>
                                );
                              })}
                            </div>
                          ) : (
                            <textarea
                              rows={4}
                              placeholder="Redacta la respuesta fisiopatológica o clínica..."
                              value={studentTextAns}
                              onChange={(e) => setStudentTextAns(e.target.value)}
                              className="w-full text-sm p-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:outline-blue-500"
                            />
                          )}
                        </div>

                        <div className="flex justify-between items-center pt-4 border-t border-slate-200">
                          <button
                            onClick={() => setCurrentQIdx(Math.max(0, currentQIdx - 1))}
                            disabled={currentQIdx === 0}
                            className="text-xs font-bold text-slate-500 hover:text-slate-800 disabled:opacity-30 cursor-pointer"
                          >
                            Anterior
                          </button>

                          {!evaluationResult ? (
                            <button
                              onClick={handleEvaluateExam}
                              disabled={isEvaluating || (!selectedOpt && !studentTextAns.trim())}
                              className="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition-all cursor-pointer shadow-md shadow-blue-600/10 disabled:opacity-40"
                            >
                              {isEvaluating ? 'Evaluando...' : 'Evaluar Respuesta'}
                            </button>
                          ) : (
                            <button
                              onClick={handleNextQuestion}
                              className="bg-slate-900 hover:bg-slate-800 text-white font-semibold px-6 py-2.5 rounded-xl text-sm transition-all cursor-pointer"
                            >
                              Siguiente Pregunta
                            </button>
                          )}
                        </div>

                        {/* Evaluation Result Display */}
                        {evaluationResult && (
                          <div className={`p-6 rounded-xl border space-y-4 text-left ${evaluationResult.isCorrect ? 'bg-blue-50/50 border-blue-100' : 'bg-rose-50/50 border-rose-100'}`}>
                            <div className="flex justify-between items-center">
                              <h4 className="font-bold text-slate-900 text-sm uppercase">Resultados del Evaluador UCS</h4>
                              <span className={`text-[10px] font-bold font-mono px-2 py-0.5 rounded border ${evaluationResult.isCorrect ? 'bg-blue-100 text-blue-850' : 'bg-rose-100 text-rose-850'}`}>
                                {evaluationResult.grade}
                              </span>
                            </div>
                            <p className="text-xs md:text-sm text-slate-600"><strong>Retroalimentación:</strong> {evaluationResult.detailedFeedback}</p>
                            <div className="p-3 bg-white/80 rounded-lg border border-slate-200 space-y-1">
                              <strong className="text-slate-900 text-xs">Respuesta Fisiopatológica Correcta:</strong>
                              <p className="text-slate-500 text-xs italic">{evaluationResult.correctExplanation}</p>
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  {/* Right: Score Stats */}
                  <div className="lg:col-span-4 space-y-6">
                    <div className="bg-slate-950 rounded-2xl p-6 text-white border border-slate-800 space-y-6 shadow-xl">
                      <h3 className="font-bold text-white text-base">Calificación del Simulador</h3>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                          <span className="text-slate-500 text-[10px] uppercase font-mono block">Efectividad</span>
                          <strong className="text-2xl font-bold font-mono text-white">
                            {scoreStats.answered > 0 ? Math.round((scoreStats.correct / scoreStats.answered) * 100) : 0}%
                          </strong>
                        </div>
                        <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                          <span className="text-slate-500 text-[10px] uppercase font-mono block">Aprobadas</span>
                          <strong className="text-2xl font-bold font-mono text-blue-400">{scoreStats.correct}</strong>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            )}

            {/* Footer */}
            <footer className="h-12 bg-white border-t border-slate-200 flex items-center justify-between px-6 text-[10px] text-slate-400 font-mono mt-auto">
              <span>Gemini Engine: ONLINE</span>
              <span>© 2026 Tutor Clínico UCS — Single-File Standalone App</span>
            </footer>

          </div>
        </div>
      );
    }

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
