        summary: 'Caracterización de la disciplina Morfofisiopatología Humana. Conceptos de proceso patológico, etiología, patogenia, cambios morfológicos, semiología, fisiopatología y patocronía. Clasificación causal fundamental: Genéticos y Adquiridos.',
        content: `La Morfofisiopatología Humana es una disciplina integradora que unifica los conocimientos de la Genética, Anatomía Patológica, Inmunología, Microbiología, Parasitología, Laboratorio Clínico e Imagenología.

Un proceso patológico es el trastorno fisiopatológico dinámico caracterizado por alteraciones moleculares, celulares, tisulares y de órganos que se reflejan en los síntomas y signos de enfermedad.

Su núcleo de estudio abarca:
1. Etiología: Estudio de las causas que originan la enfermedad (físicas, químicas, biológicas, genéticas, hemodinámicas, inmunitarias, nutricionales).
2. Patogenia: Mecanismos de producción y desarrollo de la enfermedad.
3. Cambios morfológicos: Alteraciones estructurales macroscópicas y microscópicas en células, tejidos y órganos.
4. Fisiopatología: Consecuencias funcionales de los cambios morfológicos.
5. Semiología: Estudio de los síntomas (subjetivos) y signos (objetivos) de la enfermedad.
6. Patocronía: Evolución de la enfermedad a lo largo del tiempo.

Clasificación según la causa:
- Genéticos: Monogénicos (simples mutaciones), Cromosómicos (aberraciones numéricas o estructurales) y Multifactoriales (interacción gen-ambiente).

        content: `Una muestra biológica es la porción proveniente de tejidos o fluidos obtenida para su análisis y diagnóstico.

Departamentos diagnósticos y sus fundamentos:
1. Anatomía Patológica: Biopsias (incisional, excisional, por ponche, curetaje, por congelación/transoperatoria, aspirativa) y citologías.

5. Imagenología: Rayos X simples y contrastados, ecosonografía (ultrasonido), tomografía axial computarizada (TAC), resonancia magnética (RM) y gammagrafía.

Requisitos de la toma de muestra:

Bioética diagnóstica:

        content: `La adaptación celular es un estado de equilibrio alterado pero reversible frente a demandas fisiológicas excesivas o estímulos patológicos.

Tipos de adaptación celular:
1. Atrofia: Disminución del tamaño y función celular por reducción de sus componentes (ej: atrofia uterina postparto [fisiológica], atrofia renal por isquemia crónica [patológica]).
2. Hipertrofia: Aumento del tamaño celular que incrementa el volumen del órgano. Ocurre en células que no se dividen (ej: músculo de deportistas [fisiológica], hipertrofia miocárdica por hipertensión arterial [patológica]).
3. Hiperplasia: Aumento del número de células en un órgano por mitosis (ej: mama en el embarazo [fisiológica], hiperplasia prostática benigna o bocio tiroideo [patológica]).
4. Metaplasia: Sustitución reversible de un tipo celular adulto por otro tipo celular adulto mejor capacitado para soportar el ambiente adverso (ej: metaplasia escamosa del epitelio respiratorio en fumadores).

Etiopatogenia de la lesión por Hipoxia e Isquemia:
- La falta de oxígeno inhibe la fosforilación oxidativa mitocondrial, provocando caída drástica del ATP.
- Falla de la bomba de Na+-K+ ATPasa: Salida de K+, entrada masiva de Na+ y agua por ósmosis, ocasionando tumefacción hidrópica celular.`

        content: `Morfología de la lesión celular reversible:
1. Tumefacción celular (cambio hidrópico): vacuolas claras de agua en el citoplasma por fallo de bombas iónicas.
2. Cambio graso (esteatosis): acumulación de vacuolas de triglicéridos en el citoplasma (frecuente en hígado por alcoholismo o dieta grasa).

Muerte celular por Necrosis (Irreversible):
- Siempre es patológica, con desnaturalización proteica y digestión enzimática por autólisis y heterólisis.
- Cambios nucleares necróticos: Picnosis (encogimiento e hiperbasofilia), Cariorrexis (fragmentación nuclear) y Cariolisis (disolución de la cromatina).

Patrones morfológicos de Necrosis:
a) Necrosis por Coagulación: conservación del contorno celular ("imagen en fantasma" o "lápida sepulcral"). Causa típica: infarto agudo del miocardio por isquemia.
b) Necrosis Colicuativa (Liquefactiva): digestión enzimática rápida que convierte el tejido en masa líquida. Típica de infartos cerebrales y abscesos.
c) Necrosis Caseosa: aspecto blanco-amarillento, friable, semejante al queso seco. Patognomónica de la Tuberculosis.
d) Necrosis Enzimática de las Grasas: liberación de lipasas pancreáticas que digieren el tejido adiposo, formando depósitos de calcio (saponificación grasa o "jabones"). Ocurre en la pancreatitis aguda.

Apoptosis: Muerte celular programada sin respuesta inflamatoria, caracterizada por condensación cromatínica, formación de cuerpos apoptóticos y fagocitosis rápida.`

        content: `Acumulaciones Intracelulares:
- Sustancias normales en exceso: Agua, triglicéridos, colesterol y glucógeno.
- Pigmentos: Exógenos (polvo de carbón en la antracosis, tatuajes) y Endógenos (melanina, bilirrubina, lipofuscina, hemosiderina).

Aterosclerosis:
- Enfermedad de arterias elásticas y musculares caracterizada por placas lipídicas fibroinflamatorias en la túnica íntima (ateromas).
- Complicaciones: Ulceración, trombosis, aneurismas, infarto miocárdico e infarto cerebral.

Diabetes Mellitus:
- Trastorno metabólico caracterizado por hiperglicemia crónica.
- Tipo 1: Deficiencia absoluta de insulina por destrucción autoinmune de células beta pancreáticas.
- Tipo 2: Resistencia periférica a la insulina combinada con secreción inadecuada.
- Cambios microvasculares (Microangiopatía): Engrosamiento difuso de membranas basales capilares.
- Lesión renal patognomónica: Glomeruloesclerosis nodular intercapilar o ENFERMEDAD DE KIMMELSTIEL-WILSON.

Calcificaciones Patológicas:
- Calcificación Distrófica: Depósito de calcio en tejidos necróticos o alterados con niveles séricos de calcio normales (ej: placas de ateroma, válvulas cardiacas lesionadas, centro de tuberculosis).
- Calcificación Metastásica: Depósito de calcio en tejidos normales debido a hipercalcemia sérica (ej: hiperparatiroidismo, intoxicación con Vitamina D, insuficiencia renal crónica).`

        summary: 'Inflamación como respuesta vascularizada. Signos cardinales (rubor, calor, tumor, dolor, impotencia funcional). Fases vasculares, fenómenos leucocitarios y mediadores (histamina). Patrones de exudado.',
        content: `La inflamación es una respuesta protectora compleja del tejido conjuntivo vascularizado ante agentes lesivos.

Signos cardinales de la inflamación: Rubor, Calor, Tumor (edema), Dolor e Impotencia Funcional.

Inflamación Aguda:
- Comienzo rápido y corta duración. Dominada por polimorfonucleares neutrófilos.
- Cambios vasculares: Vasodilatación arteriolar inmediata (medida por Histamina), aumento del flujo e incremento de la permeabilidad vascular con formación de exudado.
- Fenómenos leucocitarios: Marginación, rodamiento, adhesión (pavimentación), migración (diapédesis), quimiotaxis y fagocitosis (fagosoma + lisosoma).

Inflamación Crónica:
- Duración prolongada (semanas, meses o años). Coexisten simultáneamente la inflamación activa, la destrucción tisular y los intentos de reparación.
- Infiltrado característico: Linfocitos, macrófagos y células plasmáticas.

Patrones morfológicos de la inflamación:
1. Serosa: Exudado acuoso pobre en proteínas (derrame pleural/pericárdico, ampollas).
2. Fibrinosa: Depósito de abundante fibrina en superficies serosas (pericarditis fibrinosa "en pan con mantequilla").
3. Supurativa o Purulenta: Gran cantidad de exudado purulento rico en neutrófilos y detritus (meningitis bacteriana, apendicitis aguda).
4. Granulomatosa: Acumulación focal de macrófagos activados (células epitelioides) rodeados por corona de linfocitos y células gigantes (ej: Tuberculosis).`

        content: `Capacidad regenerativa de las células:
- Células Lábiles: Proliferación continua durante toda la vida (epitelio de piel, mucosa digestiva, médula ósea).
- Células Estables: Quiescentes en fase G0, pero conservan la capacidad de entrar al ciclo celular ante estímulos (hepatocitos, túbulos renales, fibroblastos).
- Células Permanentes: Incapaces de dividirse tras el nacimiento (neuronas, fibras musculares miocárdicas).

Formas de Reparación:
1. Regeneración parenquimatosa: Sustitución de células lesionadas por células del mismo tipo. Requiere preservación de la membrana basal y del estroma.
2. Cicatrización (Fibrosis): Sustitución del tejido destruido por tejido conjuntivo fibroso mediante formación de TEJIDO DE GRANULACIÓN (proliferación de neovasos/angiogénesis y fibroblastos).

Tipos de Cicatrización Cutánea:
- Primera Intención: Ocurre en heridas quirúrgicas limpias, no infectadas, con bordes aproximados por sutura. Mínimo tejido de granulación y cicatriz lineal fina.
- Segunda Intención: Ocurre en heridas con amplia pérdida tisular, úlceras o necrosis. Abundante tejido de granulación, contracción de la herida mediada por miofibroblastos y cicatriz prominente.

Complicaciones: Dehiscencia de herida, hernias de incisión, tejido de granulación exuberante, queloides (exceso de colágeno) y contracturas.`

        content: `Enfermedades Monogénicas (Simples Mutaciones):
Siguen los patrones de herencia mendeliana clásica y se representan en el árbol genealógico (pedigrí).

1. Herencia Autosómica Dominante (ej: Polidactilia, Acondroplasia, Marfan):
- Expresión en heterocigotos (Aa).
- Patrón de transmisión vertical (afectados en todas las generaciones).
- Varones y hembras afectados por igual. Riesgo de recurrencia en descendencia: 50%.
- Transmisión varón a varón es posible.

2. Herencia Autosómica Recesiva (ej: Sicklemia, Albinismo, Fibrosis Quística):
- Requiere doble dosis del gen mutado en homocigosis (aa).
- Padres fenotípicamente sanos pero portadores heterocigotos (Aa).
- Patrón de transmisión horizontal. Consanguinidad aumenta el riesgo.
- Riesgo de recurrencia por cada embarazo: 25%.

3. Herencia Recesiva Ligada al X (ej: Hemofilia A, Distrofia Muscular de Duchenne):
- Gen mutado en el cromosoma X.
- Mayoritariamente varones afectados (hemicigotos XhY).
- Las mujeres son portadoras asintomáticas (XHXh).
- Un hombre afectado NO transmite la enfermedad a sus hijos varones (100% de hijas portadoras).
- Una mujer portadora transmite el gen afectado al 50% de sus hijos varones (enfermos) y al 50% de sus hijas (portadoras).`

        id: 'doc-w9',

        summary: 'Penetrancia reducida, expresividad variable, lyonización (corpúsculo de Barr), herencia mitocondrial (vía materna), impronta genómica (Prader-Willi / Angelman).',
        content: `Fenómenos biológicos que alteran la herencia mendeliana:

1. Penetrancia Reducida: Un individuo posee el genotípicamente mutado dominante pero NO expresa el fenotipo clínico.
2. Expresividad Variable: Variación en la gravedad o manifestaciones del fenotipo entre individuos con el mismo genotipo mutado.
3. Inactivación del Cromosoma X (Lyonización): Inactivación aleatoria de uno de los cromosomas X en células femeninas en fase de mórula, formando el corpúsculo de Barr.
4. Herencia Mitocondrial (ej: Neuropatía Óptica de Leber):
- Transmisión EXCLUSIVAMENTE MATERNA. El espermatozoide no aporta mitocondrias al cigoto.
- Afecta a hombres y mujeres, pero un hombre afectado NUNCA transmite la enfermedad.
5. Impronta Genómica (Genomic Imprinting):
- Inactivación epigenética selectiva del alelo materno o paterno.
- Deleción 15q11-13 de origen PATERNO causa Síndrome de PRADER-WILLI (obesidad, hipogonadismo).
- Deleción 15q11-13 de origen MATERNO causa Síndrome de ANGELMAN (epilepsia, risa inapropiada, ataxia).
6. Mutaciones Dinámicas (ej: Síndrome del Cromosoma X Frágil):
- Expansión inestable de tripletes de nucleótidos (CGG > 200). Muestra el fenómeno de anticipación genacional.

Bases Bioquímicas:
- Errores innatos del metabolismo (ej: Fenilcetonuria por déficit de fenilalanina hidroxilasa).
- Proteínas de transporte afectadas (ej: Sicklemia por hemoglobina S [valina por ac. glutámico]).`

        topic: 'Aberraciones Cromosómicas Numéricas y Estructurales',
        summary: 'Aneuploidías: Trisomías 21 (Down), 13 (Patau), 18 (Edwards), Turner (45,X), Klinefelter (47,XXY). Corpúsculos de Barr (Fórmula N° X - 1).',
        content: `Aberraciones Cromosómicas Numéricas (Aneuploidías):
Causadas principalmente por NO DISYUNCIÓN meiótica o anafase retardada.

Trisomías Autosómicas:
1. Síndrome de Down (47,XX,+21 o 47,XY,+21): Hipotonía, pliegue palmar único, facies mongoloide, retraso mental.
2. Síndrome de Patau (Trisomía 13): Holoprosencefalia, labio leporino, polidactilia. Severo y letal.
3. Síndrome de Edwards (Trisomía 18): Puños cerrados con sobreposición de dedos, micrognatia, pies en mecedora.

Aneuploidías Sexuales y Corpúsculo de Barr:
- Fórmula del Corpúsculo de Barr: N° de Corpúsculos de Barr = N° de Cromosomas X - 1.
a) Síndrome de Turner (45,X):
   - Monosomía del cromosoma X. Talla baja, cuello alado (pterygium colli), amenorrea primaria, infantilismo sexual.
   - Corpúsculos de Barr: 0 (1 - 1 = 0).
b) Síndrome de Klinefelter (47,XXY):
   - Varón con cromosoma X supernumerario. Talla alta, ginecomastia, testículos pequeños e infertilidad.
   - Corpúsculos de Barr: 1 (2 - 1 = 1).

Aberraciones Estructurales:
- Balanceadas (Translocaciones recíprocas, Inversiones): Sin pérdida/ganancia de material. Fenotipo normal pero fallas reproductivas.
- No Balanceadas (Deleciones, Duplicaciones, Isocromosomas): Alteración fenotípica. Ej: Síndrome de Cri du Chat (deleción 5p-).`
      },

        id: 'doc-w11',

            evalData = await res.json();
          } else {
            evalData = {
              isCorrect: quizStudentAns.length > 15,
              grade: quizStudentAns.length > 25 ? 'SOBRESALIENTE' : 'SATISFACTORIO',
              detailedFeedback: 'Excelente fundamentación. Demuestras buen dominio de los conceptos médicos de la asignatura.',
              correctExplanation: pendingQuiz.correctAnswer
            };
          }

            id: `t-eval-${Date.now()}`,
            sender: 'tutor',
            text: `📝 **EVALUACIÓN DE TU RESPUESTA (${evalData.grade})**:\n\n${evalData.detailedFeedback}\n\n💡 **Respuesta Patrón UCS**: ${evalData.correctExplanation || pendingQuiz.correctAnswer}`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };
          setMessages(prev => [...prev, evalMsg]);
          setPendingQuiz(null);
          setQuizStudentAns('');
        } catch (e) {
          console.error(e);
        } finally {
          setIsTutorThinking(false);
        }
      };

      // Exam Evaluator
      const activeQuestion = EXAM_BATTERY[currentQIdx];

        if (!activeQuestion) return;
        const answerGiven = activeQuestion.type === 'DESARROLLO_CORTO' ? writtenAns : selectedOpt;
        if (!answerGiven) return;

        setIsEvaluating(true);
        try {
          const res = await fetch('/api/gemini/evaluate-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              question: activeQuestion.question,
              studentAnswer: answerGiven,
              correctAnswer: activeQuestion.correctAnswer,
              topicContext: activeQuestion.communityContext
            })
          });

            setEvalResult(result);
            if (result.isCorrect) setScoreStats(prev => ({ ...prev, correct: prev.correct + 1 }));
            setScoreStats(prev => ({ ...prev, answered: prev.answered + 1 }));
          } else {

          setScoreStats(prev => ({ ...prev, answered: prev.answered + 1 }));
        } finally {
          setIsEvaluating(false);
        }
      };

        setWrittenAns('');

                    <span className="text-xs font-bold text-blue-600 font-mono uppercase">Tutor Interactivo UCS</span>
                    <h2 className="text-xl font-bold text-slate-900">Aclarar Dudas & Explicaciones Personalizadas</h2>
                    <p className="text-xs text-slate-500 mt-1">Pregúntale lo que sea al Tutor o pídele que te haga una pregunta de autoevaluación.</p>
                  </div>

                  <div className="flex items-center gap-2">
                    <label className="text-xs font-bold text-slate-600 font-mono">Semana:</label>
                    <select
                      value={tutorWeek}
                      onChange={(e) => setTutorWeek(Number(e.target.value))}
                      className="text-sm font-semibold bg-slate-100 border border-slate-300 rounded-xl px-3 py-2 text-slate-800"
                    >
                      {documents.map(d => (
                        <option key={d.id} value={d.week}>Semana {d.week}: {d.topic.slice(0, 30)}...</option>
                      ))}
                    </select>
                  </div>
                </div>

                <div className="bg-white rounded-2xl border border-slate-200 shadow-2xs flex flex-col min-h-[500px]">
                  {/* Messages */}
                  <div className="flex-1 p-6 space-y-4 overflow-y-auto max-h-[550px]">
                    {chatMessages.map(msg => (
                      <div key={msg.id} className={`flex gap-3 ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                        {msg.sender === 'tutor' && (
                          <div className="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-bold text-xs flex-shrink-0">TC</div>
                        )}
                        <div className={`max-w-[85%] rounded-2xl p-4 text-sm leading-relaxed ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-100 text-slate-900 rounded-tl-none border border-slate-200'}`}>
                          <div className="whitespace-pre-wrap">{msg.text}</div>
                          <div className={`text-[10px] mt-2 font-mono ${msg.sender === 'user' ? 'text-blue-200 text-right' : 'text-slate-400'}`}>{msg.time}</div>
                        </div>
                      </div>
                    ))}

                    {isTutorThinking && (
                      <div className="flex gap-2 items-center text-slate-400 text-xs animate-pulse font-mono">
                        <div className="w-2 h-2 rounded-full bg-blue-600 animate-bounce"></div>
                        <span>El Tutor Clínico está redactando la explicación...</span>
                      </div>
                    )}
                  </div>

                  {/* Suggestion Chips */}
                  <div className="p-4 bg-slate-50 border-t border-slate-200 space-y-2">
                    <div className="flex justify-between items-center text-[11px] font-bold text-slate-500 font-mono">
                      <span>Sugerencias rápidas:</span>
                      <button
                        onClick={handleRequestTutorQuiz}
                        disabled={isTutorThinking}
                        className="text-blue-600 font-bold hover:underline cursor-pointer"
                      >
                        🎯 ¡Hazme una pregunta de examen!
                      </button>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      {[
                        `Explícame detalladamente todo sobre la Semana ${tutorWeek}`,
                        `¿Cuáles son las preguntas clave de examen de este tema?`,
                        `¿Cómo aplico este tema en el Consultorio Popular del ASIC?`
                      ].map((promptText, i) => (
                        <button
                          key={i}
                          onClick={() => handleSendChat(promptText)}
                          disabled={isTutorThinking}
                          className="text-xs bg-white hover:bg-blue-50 text-slate-700 font-semibold px-3 py-1.5 rounded-lg border border-slate-200 cursor-pointer"
                        >
                          {promptText}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Quiz Box */}
                  {pendingQuiz && (
                    <div className="p-4 bg-blue-50 border-t border-blue-200 space-y-2">
                      <p className="text-xs font-bold text-blue-900">Responde a la pregunta del Tutor para ser calificado:</p>
                      <div className="flex gap-2">
                        <input
                          type="text"
                          value={quizStudentAns}
                          onChange={(e) => setQuizStudentAns(e.target.value)}
                          placeholder="Escribe tu respuesta clínica aquí..."
                          className="flex-1 text-sm bg-white border border-blue-300 rounded-xl px-4 py-2"
                        />
                        <button
                          onClick={handleEvaluateTutorQuiz}
                          disabled={!quizStudentAns.trim() || isTutorThinking}
                          className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-xl text-xs cursor-pointer"
                        >
                          Enviar Respuesta
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Input Form */}
                  <div className="p-4 bg-white border-t border-slate-200 rounded-b-2xl">
                    <form onSubmit={(e) => { e.preventDefault(); handleSendChat(); }} className="flex gap-2">
                      <input
                        type="text"
                        value={chatInput}
                        onChange={(e) => setChatInput(e.target.value)}
                        placeholder="Escribe tu duda clínica sobre el tema..."
                        disabled={isTutorThinking}
                        className="flex-1 text-sm bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-900 focus:outline-blue-600"
                      />
                      <button
                        type="submit"
                        disabled={!chatInput.trim() || isTutorThinking}
                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl text-sm cursor-pointer shadow-md shadow-blue-500/10"
                      >
                        Preguntar
                      </button>
                    </form>
                  </div>
                </div>
              </main>
            )}

            {/* TAB 4: SIMULADOR DE EXAMEN */}
            {activeTab === 'simulador' && activeQuestion && (
              <main className="flex-1 p-4 md:p-8 space-y-6">
                <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-2xs space-y-4">
                  <div className="flex justify-between items-center">
                    <div>
                      <span className="text-xs font-mono text-blue-600 font-bold uppercase">Baterías Oficiales UCS 2008-2024</span>
                      <h2 className="text-xl font-bold text-slate-900 mt-1">Pregunta {currentQIdx + 1} de {EXAM_BATTERY.length}</h2>
                    </div>

                    <div className="flex gap-4 text-xs font-mono font-bold">
                      <span className="bg-slate-100 p-2 rounded-lg text-slate-700">Contestadas: {scoreStats.answered}</span>
                      <span className="bg-emerald-100 p-2 rounded-lg text-emerald-800">Correctas: {scoreStats.correct}</span>
                    </div>
                  </div>

                  <div className="p-6 bg-slate-50 rounded-2xl border border-slate-200 space-y-4">
                    <p className="text-base font-semibold text-slate-900 leading-relaxed font-sans">{activeQuestion.question}</p>

                    {activeQuestion.type === 'SELECT_SIMPLE' || activeQuestion.type === 'CLINICO_COMUNITARIO' ? (
                      <div className="space-y-2 pt-2">
                        {activeQuestion.options.map((opt, i) => (
                          <label
                            key={i}
                            className={`flex items-center p-3.5 rounded-xl border cursor-pointer text-xs md:text-sm font-semibold transition-all ${
                              selectedOpt === opt ? 'bg-blue-50 border-blue-500 text-blue-900 shadow-2xs' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-100'
                            }`}
                          >
                            <input
                              type="radio"
                              name="opt"
                              value={opt}
                              checked={selectedOpt === opt}
                              onChange={(e) => setSelectedOpt(e.target.value)}
                              className="mr-3 text-blue-600"
                            />
                            <span>{opt}</span>
                          </label>
                        ))}
                      </div>
                    ) : (
                      <div className="space-y-2 pt-2">
                        <textarea
                          rows="4"
                          value={writtenAns}
                          onChange={(e) => setWrittenAns(e.target.value)}
                          placeholder="Escribe tu respuesta de desarrollo corto aquí..."
                          className="w-full text-sm p-4 rounded-xl border border-slate-300 bg-white focus:outline-blue-600"
                        />
                      </div>
                    )}

                    <div className="pt-2 flex justify-between items-center">
                      <button
                        onClick={handleEvaluateExamQuestion}
                        disabled={isEvaluating || (!selectedOpt && !writtenAns.trim())}
                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl text-xs md:text-sm cursor-pointer shadow-md shadow-blue-500/10"
                      >
                        {isEvaluating ? 'Evaluando...' : 'Evaluar Respuesta'}
                      </button>

                      {evalResult && (
                        <button
                          onClick={handleNextQuestion}
                          className="bg-slate-900 hover:bg-slate-800 text-white font-bold px-6 py-3 rounded-xl text-xs md:text-sm cursor-pointer"
                        >
                          Siguiente Pregunta →
                        </button>
                      )}
                    </div>
                  </div>

                  {evalResult && (
                    <div className={`p-6 rounded-2xl border space-y-3 ${evalResult.isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-900' : 'bg-rose-50 border-rose-200 text-rose-900'}`}>
                      <div className="flex justify-between items-center">
                        <span className="font-bold text-sm font-mono">{evalResult.isCorrect ? '✓ RESPUESTA CORRECTA' : '✗ REQUIERE REVISIÓN'}</span>
                        <span className="px-2.5 py-1 rounded bg-white text-xs font-bold font-mono border">{evalResult.grade}</span>
                      </div>
                      <p className="text-xs md:text-sm leading-relaxed">{evalResult.detailedFeedback}</p>
                      <div className="pt-2 border-t border-slate-200/60 text-xs font-sans">
                        <strong>Explicación Fisiopatológica Oficial:</strong> {evalResult.correctExplanation}
                      </div>
                    </div>
                  )}

                </div>
              </main>
            )}

          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
