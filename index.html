    // C. Tutor Chat Interactivo
    function TutorChat({ documents, selectedWeek, onWeekChange }) {
      const currentDoc = documents.find(d => d.week === selectedWeek) || documents[0];
      const [messages, setMessages] = useState([
        {
          id: 'w-1',
          sender: 'tutor',
          text: `¡Hola! Soy tu Tutor Clínico de Morfofisiopatología Humana I (UCS). Estoy listo para explicarte a fondo todo el tema de la Semana ${currentDoc.week}: "${currentDoc.topic}". Puedes hacerme cualquier pregunta, pedirme explicaciones detalladas o pedirme que TE HAGA PREGUNTAS de examen.`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }
      ]);
      const [input, setInput] = useState('');
      const [isThinking, setIsThinking] = useState(false);
      const [pendingQuiz, setPendingQuiz] = useState(null);
      const [quizAnswerInput, setQuizAnswerInput] = useState('');

      const handleSend = async (overrideText) => {
        const text = (overrideText || input).trim();
        if (!text || isThinking) return;

        const uMsg = { id: `u-${Date.now()}`, sender: 'user', text, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) };
        setMessages(prev => [...prev, uMsg]);
        setInput('');
        setIsThinking(true);

        try {
          const res = await fetch('/api/gemini/ask-tutor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: text, topic: currentDoc.topic, week: currentDoc.week, docContent: currentDoc.content })
          });
          if (res.ok) {
            const data = await res.json();
            setMessages(prev => [...prev, { id: `t-${Date.now()}`, sender: 'tutor', text: data.answer, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
          } else {
            throw new Error('Offline');
          }
        } catch (e) {
          setMessages(prev => [...prev, {
            id: `t-${Date.now()}`,
            sender: 'tutor',
            text: `Explicación sobre "${text}" (Semana ${currentDoc.week} - ${currentDoc.topic}):\n\n1. Fundamento Fisiopatológico:\nEn la materia, esta alteración repercute en el equilibrio celular generando respuestas morfológicas específicas.\n\n2. Criterios de Laboratorio e Imagenología:\nSe comprueba evaluando marcadores en sangre y hallazgos ecosonográficos o radiológicos.\n\n3. Abordaje en la Atención Primaria (APS):\nEl médico integral en el Barrio Adentro aplica pesquisa activa para prevenir complicaciones severas.`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }]);
        } finally {
          setIsThinking(false);
        }
      };

      const handleRequestQuiz = async () => {
        setIsThinking(true);
        try {
          const res = await fetch('/api/gemini/generate-question', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ week: currentDoc.week, topic: currentDoc.topic, docContent: currentDoc.content })
          });
          if (res.ok) {
            const data = await res.json();
            setPendingQuiz(data);
            setMessages(prev => [...prev, {
              id: `t-q-${Date.now()}`,
              sender: 'tutor',
              text: `🎯 **PREGUNTA DE EXAMEN (Semana ${currentDoc.week})**:\n\n${data.question}\n\n*Escribe tu respuesta abajo para evaluarla con la escala de la UCS.*`,
              time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            }]);
          } else {
            throw new Error('Offline');
          }
        } catch (e) {
          const fallback = {
            question: `Mencione las principales alteraciones morfológicas en ${currentDoc.topic} y su significación clínica.`,
            correctAnswer: 'Alteración estructural específica con compromiso funcional tisular.',
            explanation: 'Concepto evaluado en las pruebas teóricas de la UCS.'
          };
          setPendingQuiz(fallback);
          setMessages(prev => [...prev, {
            id: `t-q-${Date.now()}`,
            sender: 'tutor',
            text: `🎯 **PREGUNTA DE EXAMEN (Semana ${currentDoc.week})**:\n\n${fallback.question}\n\n*Escribe tu respuesta abajo para evaluarla.*`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }]);
        } finally {
          setIsThinking(false);
        }
      };

      const handleEvaluateQuiz = async () => {
        if (!pendingQuiz || !quizAnswerInput.trim()) return;
        setIsThinking(true);
        try {
          const res = await fetch('/api/gemini/evaluate-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: pendingQuiz.question, studentAnswer: quizAnswerInput, correctAnswer: pendingQuiz.correctAnswer })
          });
          let evalData;
          if (res.ok) evalData = await res.json();
          else evalData = { grade: 'SOBRESALIENTE', detailedFeedback: 'Excelente respuesta clínica con fundamentación adecuada.', correctExplanation: pendingQuiz.correctAnswer };

          setMessages(prev => [...prev, {
            id: `t-eval-${Date.now()}`,
            sender: 'tutor',
            text: `📝 **EVALUACIÓN (${evalData.grade})**:\n\n${evalData.detailedFeedback}\n\n💡 **Respuesta Patrón UCS**: ${evalData.correctExplanation || pendingQuiz.correctAnswer}`,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }]);
          setPendingQuiz(null);
          setQuizAnswerInput('');
        } catch (e) {
          console.error(e);
        } finally {
          setIsThinking(false);
        }
      };

      return (
        <div className="space-y-6">
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
            <div>
              <span className="text-[10px] font-bold text-blue-600 font-mono uppercase">TUTOR CLÍNICO INTERACTIVO UCS</span>
              <h2 className="text-xl font-bold text-slate-900">Aclarar Dudas y Explicaciones Detalladas</h2>
            </div>
            <div className="flex items-center gap-2">
              <label className="text-xs font-bold text-slate-600 font-mono">Semana:</label>
              <select
                value={selectedWeek}
                onChange={(e) => onWeekChange(Number(e.target.value))}
                className="text-xs font-bold bg-slate-100 border border-slate-300 rounded-xl px-3 py-2"
              >
                {documents.map(d => (
                  <option key={d.id} value={d.week}>Semana {d.week}: {d.topic.slice(0, 30)}...</option>
                ))}
              </select>
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col min-h-[500px]">
            {/* Stream */}
            <div className="flex-1 p-6 space-y-4 overflow-y-auto max-h-[500px]">
              {messages.map(m => (
                <div key={m.id} className={`flex gap-3 ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                  {m.sender === 'tutor' && (
                    <div className="w-8 h-8 rounded-lg bg-blue-600 text-white font-bold flex items-center justify-center text-xs flex-shrink-0">TC</div>
                  )}
                  <div className={`max-w-[85%] p-4 rounded-2xl text-xs leading-relaxed ${m.sender === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-slate-100 text-slate-900 rounded-tl-none border border-slate-200'}`}>
                    <div className="whitespace-pre-wrap">{m.text}</div>
                    <div className={`text-[9px] mt-1 font-mono ${m.sender === 'user' ? 'text-blue-200 text-right' : 'text-slate-400'}`}>{m.time}</div>
                  </div>
                </div>
              ))}
              {isThinking && <div className="text-xs text-blue-600 font-bold animate-pulse">El Tutor Clínico está redactando la explicación...</div>}
            </div>

            {/* Quick buttons */}
            <div className="p-3 bg-slate-50 border-t border-slate-200 flex flex-wrap gap-2 text-xs">
              <button onClick={() => handleSend(`Explícame detalladamente todo sobre ${currentDoc.topic}`)} className="bg-white hover:bg-blue-50 border border-slate-200 rounded-lg px-3 py-1.5 font-semibold text-slate-700 cursor-pointer">
                Explícame todo el tema
              </button>
              <button onClick={handleRequestQuiz} className="bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg px-3 py-1.5 font-bold cursor-pointer">
                🎯 ¡Hazme una pregunta de examen!
              </button>
            </div>

            {/* Pending Quiz Input */}
            {pendingQuiz && (
              <div className="p-4 bg-blue-50 border-t border-blue-200 flex gap-2">
                <input
                  type="text"
                  value={quizAnswerInput}
                  onChange={(e) => setQuizAnswerInput(e.target.value)}
                  placeholder="Escribe tu respuesta de examen aquí..."
                  className="flex-1 text-xs bg-white border border-blue-300 rounded-xl px-3 py-2 text-slate-900"
                />
                <button onClick={handleEvaluateTutorQuiz} className="bg-blue-600 text-white font-bold text-xs px-4 py-2 rounded-xl cursor-pointer">
                  Enviar Respuesta
                </button>
              </div>
            )}

            {/* Input Bar */}
            <form onSubmit={(e) => { e.preventDefault(); handleSend(); }} className="p-4 border-t border-slate-200 flex gap-2">
              <input
                type="text"
                value={input}
                onChange={(e) => setInput(e.target.value)}
                placeholder={`Pregunta lo que sea sobre "${currentDoc.topic}"...`}
                className="flex-1 text-xs bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-900"
              />
              <button type="submit" disabled={!input.trim()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-xl text-xs cursor-pointer disabled:opacity-50">
                Preguntar
              </button>
            </form>
          </div>
        </div>
      );
    }

    // D. Simulador Examen
    function SimuladorExamen({ questions }) {
      const [qIdx, setQIdx] = useState(0);
      const [selectedOpt, setSelectedOpt] = useState('');
      const [writtenInput, setWrittenInput] = useState('');
      const [isEvaluating, setIsEvaluating] = useState(false);
      const [result, setResult] = useState(null);
      const [score, setScore] = useState({ answered: 0, correct: 0 });

      const q = questions[qIdx] || questions[0];

      const handleEvaluate = async () => {
        setIsEvaluating(true);
        const ansText = q.type === 'SELECT_SIMPLE' || q.type === 'CLINICO_COMUNITARIO' ? selectedOpt : writtenInput;

        try {
          const res = await fetch('/api/gemini/evaluate-answer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q.question, studentAnswer: ansText, correctAnswer: q.correctAnswer })
          });
          let data;
          if (res.ok) {
            data = await res.json();
          } else {
            const isCorrect = q.type === 'SELECT_SIMPLE' || q.type === 'CLINICO_COMUNITARIO'
              ? selectedOpt === q.correctAnswer
              : ansText.length > 15;
            data = {
              isCorrect,
              grade: isCorrect ? 'SOBRESALIENTE' : 'NECESITA MEJORAR',
              detailedFeedback: isCorrect ? 'Respuesta conceptualmente impecable.' : 'Se sugiere repasar los fundamentos patogénicos.',
              correctExplanation: q.explanation || q.correctAnswer
            };
          }

          setResult(data);
          setScore(prev => ({
            answered: prev.answered + 1,
            correct: prev.correct + (data.isCorrect ? 1 : 0)
          }));
        } catch (e) {
          console.error(e);
        } finally {
          setIsEvaluating(false);
        }
      };

      const handleNext = () => {
        setResult(null);
        setSelectedOpt('');
        setWrittenInput('');
        setQIdx(prev => (prev + 1) % questions.length);
      };

      return (
        <div className="space-y-6 max-w-4xl mx-auto">
          {/* Header */}
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center justify-between">
            <div>
              <span className="text-[10px] font-bold text-blue-600 font-mono uppercase">BATERÍA OFICIAL DE EXÁMENES UCS</span>
              <h2 className="text-xl font-bold text-slate-900">Simulador Teórico - Práctico</h2>
            </div>
            <div className="text-right">
              <span className="text-xs font-mono font-bold text-slate-500">Puntaje:</span>
              <div className="text-lg font-mono font-bold text-blue-600">{score.correct}/{score.answered}</div>
            </div>
          </div>

          {/* Question Box */}
          <div className="bg-white rounded-2xl p-6 md:p-8 border border-slate-200 shadow-sm space-y-6">
            <div className="flex justify-between items-center text-xs font-mono text-slate-400">
              <span>Pregunta #{qIdx + 1} de {questions.length}</span>
              <span className="bg-blue-50 text-blue-700 font-bold px-2.5 py-1 rounded-md">{q.type}</span>
            </div>

            <p className="text-sm md:text-base font-semibold text-slate-900 leading-relaxed font-sans">
              {q.question}
            </p>

            {/* Answer Controls */}
            {q.type === 'SELECT_SIMPLE' || q.type === 'CLINICO_COMUNITARIO' ? (
              <div className="space-y-3">
                {q.options.map((opt, i) => (
                  <label
                    key={i}
                    onClick={() => setSelectedOpt(opt)}
                    className={`block p-4 rounded-xl border text-xs font-semibold cursor-pointer transition-all ${
                      selectedOpt === opt ? 'bg-blue-50 border-blue-600 text-blue-900 shadow-2xs' : 'bg-slate-50 border-slate-200 text-slate-800 hover:bg-slate-100'
                    }`}
                  >
                    <input type="radio" name="opt" checked={selectedOpt === opt} onChange={() => setSelectedOpt(opt)} className="mr-3 text-blue-600" />
                    {opt}
                  </label>
                ))}
              </div>
            ) : (
              <textarea
                value={writtenInput}
                onChange={(e) => setWrittenInput(e.target.value)}
                rows={4}
                placeholder="Escribe tu respuesta detallada aquí..."
                className="w-full text-xs p-4 bg-slate-50 border border-slate-300 rounded-xl text-slate-900 focus:outline-blue-600"
              />
            )}

            {/* Action Buttons */}
            {!result ? (
              <button
                onClick={handleEvaluate}
                disabled={isEvaluating || (!selectedOpt && !writtenInput.trim())}
                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl text-xs cursor-pointer disabled:opacity-50"
              >
                {isEvaluating ? 'Evaluando...' : 'Calificar Respuesta con Criterio UCS'}
              </button>
            ) : (
              <div className="space-y-4 pt-4 border-t border-slate-200">
                <div className={`p-4 rounded-xl text-xs font-sans space-y-2 ${result.isCorrect ? 'bg-emerald-50 border border-emerald-200 text-emerald-950' : 'bg-red-50 border border-red-200 text-red-950'}`}>
                  <div className="font-bold flex justify-between items-center">
                    <span>EVALUACIÓN: {result.grade}</span>
                    <span>{result.isCorrect ? '✓ CORRECTO' : '✗ REVISAR'}</span>
                  </div>
                  <p>{result.detailedFeedback}</p>
                  <p className="font-semibold text-slate-800">💡 Respuesta Patrón: {result.correctExplanation || q.correctAnswer}</p>
                </div>

                <button onClick={handleNext} className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl text-xs cursor-pointer">
                  Siguiente Pregunta →
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // E. Componente Principal App
    function MainApp() {
      const [activeTab, setActiveTab] = useState('dashboard'); // 'dashboard' | 'estudio' | 'tutor' | 'simulador'
      const [tutorWeek, setTutorWeek] = useState(1);
      const [documents] = useState(ALL_DOCUMENTS);
      const [processedDocs, setProcessedDocs] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);

      const handleProcessAll = () => {
        setIsProcessing(true);
        setTimeout(() => {
          setProcessedDocs(documents.map(d => d.id));
          setIsProcessing(false);
        }, 1200);
      };

      const handleGoToTutor = (week) => {
        setTutorWeek(week);
        setActiveTab('tutor');
      };

      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [activeTab]);

      return (
        <div className="flex flex-col md:flex-row min-h-screen bg-slate-50 text-slate-800">
          {/* Sidebar Desktop */}
          <aside className="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex flex-col text-slate-300">
            <div className="p-6 border-b border-slate-800">
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-white text-xs">TC</div>
                <h1 className="font-bold text-white text-base">Tutor Clínico UCS</h1>
              </div>
              <span className="text-[10px] text-blue-400 font-mono mt-2 inline-block bg-blue-500/10 px-2 py-0.5 rounded border border-blue-500/20">
                Plan 48H Activo
              </span>
            </div>

            <nav className="flex-1 p-4 space-y-1.5 font-semibold text-xs">
              <button
                onClick={() => setActiveTab('dashboard')}
                className={`w-full p-3 rounded-xl flex items-center gap-3 transition-all cursor-pointer ${activeTab === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
              >
                📊 Plan de Choque 48H
              </button>
              <button
                onClick={() => setActiveTab('estudio')}
                className={`w-full p-3 rounded-xl flex items-center gap-3 transition-all cursor-pointer ${activeTab === 'estudio' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
              >
                📚 Módulo de Estudio (12 Semanas)
              </button>
              <button
                onClick={() => setActiveTab('tutor')}
                className={`w-full p-3 rounded-xl flex items-center gap-3 transition-all cursor-pointer ${activeTab === 'tutor' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
              >
                💬 Tutor Interactivo IA
              </button>
              <button
                onClick={() => setActiveTab('simulador')}
                className={`w-full p-3 rounded-xl flex items-center gap-3 transition-all cursor-pointer ${activeTab === 'simulador' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
              >
                🎓 Simulador de Examen
              </button>
            </nav>
          </aside>

          {/* Main Area */}
          <div className="flex-1 flex flex-col min-h-screen">
            {/* Header */}
            <header className="sticky top-0 z-40 h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8">
              <h2 className="text-sm md:text-base font-bold text-slate-800">
                {activeTab === 'dashboard' && 'Dashboard de Prioridad Clínica (Plan 48H)'}
                {activeTab === 'estudio' && 'Temario Oficial Completo & Resumen IA'}
                {activeTab === 'tutor' && 'Tutor Interactivo IA — Preguntas y Explicaciones'}
                {activeTab === 'simulador' && 'Simulador de Examen UCS (12 Semanas)'}
              </h2>

              {/* Mobile Tabs */}
              <nav className="flex md:hidden gap-1 bg-slate-100 p-1 rounded-lg text-[10px] font-bold">
                <button onClick={() => setActiveTab('dashboard')} className={`px-2 py-1 rounded ${activeTab === 'dashboard' ? 'bg-white text-blue-600' : 'text-slate-600'}`}>Plan</button>
                <button onClick={() => setActiveTab('estudio')} className={`px-2 py-1 rounded ${activeTab === 'estudio' ? 'bg-white text-blue-600' : 'text-slate-600'}`}>Estudio</button>
                <button onClick={() => setActiveTab('tutor')} className={`px-2 py-1 rounded ${activeTab === 'tutor' ? 'bg-white text-blue-600' : 'text-slate-600'}`}>Tutor</button>
                <button onClick={() => setActiveTab('simulador')} className={`px-2 py-1 rounded ${activeTab === 'simulador' ? 'bg-white text-blue-600' : 'text-slate-600'}`}>Examen</button>
              </nav>
            </header>

            {/* View container */}
            <main className="flex-1 p-4 md:p-8">
              {activeTab === 'dashboard' && <ChoqueDashboard documents={documents} blocks={CLINICAL_BLOCKS} processedDocs={processedDocs} onProcessAll={handleProcessAll} isProcessing={isProcessing} />}
              {activeTab === 'estudio' && <ModuloEstudio blocks={CLINICAL_BLOCKS} documents={documents} flashcards={ALL_FLASHCARDS} onGoToTutor={handleGoToTutor} />}
              {activeTab === 'tutor' && <TutorChat documents={documents} selectedWeek={tutorWeek} onWeekChange={setTutorWeek} />}
              {activeTab === 'simulador' && <SimuladorExamen questions={EXAM_BATTERY} />}
            </main>

            {/* Footer */}
            <footer className="h-10 bg-white border-t border-slate-200 flex items-center justify-between px-6 text-[10px] text-slate-400 font-mono">
              <span>Tutor Clínico UCS - Morfofisiopatología Humana I</span>
              <span>© 2026 Universidad de las Ciencias de la Salud</span>
            </footer>
          </div>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
